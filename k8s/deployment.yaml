apiVersion: apps/v1
kind: Deployment
metadata:
  name: rsa-app
  labels:
    app: rsa-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: rsa-app
  template:
    metadata:
      labels:
        app: rsa-app
    spec:
      containers:
      - name: rsa-app
        image: astou233/rsa-app:latest
        ports:
        - containerPort: 8000
        env:
        - name: DJANGO_SETTINGS_MODULE
          value: "rsa_project.settings"
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL